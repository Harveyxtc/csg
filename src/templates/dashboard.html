<!DOCTYPE html>
<html>
<head>
    <title>Project Proactive Defense</title>
</head>
<body>

<h1>Cyber Threat Monitoring Dashboard</h1>

<table border="1">
<tr>
<th>Threat</th>
<th>Severity</th>
<th>Time</th>
<th>Explanation</th>
</tr>

{% for alert in alerts %}
<tr>
<td>{{ alert.type }}</td>
<td>{{ alert.severity }}</td>
<td>{{ alert.time }}</td>
<td>{{ alert.message }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
